services:
  mysql:
    image: mysql:8.0
    container_name: foodgo-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Lyhuoy@120805
      MYSQL_DATABASE: db_foodgo
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pLyhuoy@120805"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: foodgo-backend
    restart: always
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: db_foodgo
      DB_USERNAME: root
      DB_PASSWORD: Lyhuoy@120805
    ports:
      - "8088:8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: foodgo-frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

  mobile:
    build:
      context: ./mobile
      dockerfile: Dockerfile
    container_name: foodgo-mobile
    restart: always
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  mysql_data:
